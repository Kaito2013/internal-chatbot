version: '3.8'

services:
  # =====================================================================
  # FastAPI Backend
  # =====================================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: chatbot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =====================================================================
  # Qdrant Vector Database
  # =====================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =====================================================================
  # Redis (Session Store)
  # =====================================================================
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =====================================================================
  # Nginx (Reverse Proxy + Static Files)
  # =====================================================================
  nginx:
    image: nginx:alpine
    container_name: chatbot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL certificates (optional)
      - ./widget:/usr/share/nginx/html/widget:ro  # Serve widget static files
    depends_on:
      - backend
    restart: unless-stopped

# =====================================================================
# Volumes
# =====================================================================
volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
