version: '3.8'

services:
  # =====================================================================
  # FastAPI Backend
  # =====================================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: chatbot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =====================================================================
  # PostgreSQL Database (Admin Logs & Metadata)
  # =====================================================================
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_admin}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================================
  # Adminer (Lightweight Database Admin UI)
  # =====================================================================
  adminer:
    image: adminer:4.8.1
    container_name: chatbot-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      ADMINER_DESIGN: "pepa-linha"
      ADMINER_PLUGINS: "tables-filter"

  # =====================================================================
  # Qdrant Vector Database
  # =====================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =====================================================================
  # Redis (Session Store)
  # =====================================================================
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =====================================================================
  # Nginx (Reverse Proxy + Static Files)
  # =====================================================================
  nginx:
    image: nginx:alpine
    container_name: chatbot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL certificates (optional)
      - ./widget:/usr/share/nginx/html/widget:ro  # Serve widget static files
    depends_on:
      - backend
    restart: unless-stopped

# =====================================================================
# Volumes
# =====================================================================
volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
